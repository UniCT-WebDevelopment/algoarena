<div class="max-w-xl mx-auto">
  <section class="glass-panel pixel-border p-8 space-y-6">
    <div class="space-y-2">
      <p class="uppercase text-xs tracking-[0.4em] text-slate-400">Reset</p>
      <h2 class="text-2xl font-semibold">Password dimenticata?</h2>
      <p class="text-sm text-slate-300">Inserisci l'email per ricevere le istruzioni di recupero.</p>
    </div>

    <form class="space-y-4" [formGroup]="form" (ngSubmit)="submit()">
      <div class="space-y-2">
        <label class="text-sm text-slate-200">Email</label>
        <input
          type="email"
          formControlName="email"
          placeholder="nome@dominio.com"
          class="w-full rounded-xl border border-slate-600/60 bg-slate-900/50 px-4 py-3 text-slate-100 focus:border-amber-400 focus:outline-none"
        />
        <p *ngIf="form.controls.email.touched && form.controls.email.invalid" class="text-xs text-rose-300">
          Inserisci un'email valida.
        </p>
      </div>

      <p *ngIf="errorMessage" class="text-sm text-rose-300">{{ errorMessage }}</p>
      <p *ngIf="infoMessage" class="text-sm text-emerald-200">{{ infoMessage }}</p>

      <button
        type="submit"
        [disabled]="form.invalid || isLoading"
        class="w-full rounded-full bg-amber-400 px-5 py-3 text-sm font-semibold text-slate-900 transition-opacity disabled:cursor-not-allowed disabled:opacity-60"
      >
        {{ isLoading ? 'Invio in corso...' : 'Invia istruzioni' }}
      </button>
    </form>

    <div *ngIf="resetToken" class="space-y-3 rounded-2xl border border-amber-400/40 bg-amber-400/10 p-4 text-sm text-amber-100">
      <p class="font-semibold">Token di reset (ambiente di sviluppo)</p>
      <code class="block break-all text-amber-200">{{ resetToken }}</code>
      <button
        type="button"
        (click)="goToReset()"
        class="rounded-full border border-amber-300/60 px-4 py-2 text-xs uppercase tracking-[0.3em] text-amber-100"
      >
        Vai al reset
      </button>
    </div>

    <div class="text-sm text-slate-300">
      <a routerLink="/login" class="text-amber-200 hover:text-amber-100">Torna al login</a>
    </div>
  </section>
</div>
